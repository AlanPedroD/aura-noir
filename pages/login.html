<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aura Noir — Acesso Restrito</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Tenor+Sans&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black: #080808;
      --gold: #c9a84c;
      --gold-light: #e8c97a;
      --white: #f5f0e8;
      --text-muted: #666;
      --surface: #111;
      --border: rgba(201,168,76,0.2);
    }

    body {
      background: var(--black);
      color: var(--white);
      font-family: 'Tenor Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Atmospheric background */
    .bg-noise {
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(ellipse 60% 50% at 30% 50%, rgba(201,168,76,0.06) 0%, transparent 70%),
        radial-gradient(ellipse 40% 60% at 75% 30%, rgba(201,168,76,0.04) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    .bg-lines {
      position: fixed;
      inset: 0;
      background-image:
        repeating-linear-gradient(0deg, transparent, transparent 79px, rgba(201,168,76,0.04) 79px, rgba(201,168,76,0.04) 80px),
        repeating-linear-gradient(90deg, transparent, transparent 79px, rgba(201,168,76,0.04) 79px, rgba(201,168,76,0.04) 80px);
      pointer-events: none;
      z-index: 0;
    }

    /* Login card */
    .login-wrap {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
      padding: 20px;
      animation: fadeUp 0.9s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .login-card {
      background: rgba(17,17,17,0.95);
      border: 1px solid var(--border);
      padding: 52px 44px 44px;
      position: relative;
      backdrop-filter: blur(20px);
    }

    /* Decorative corners */
    .login-card::before,
    .login-card::after {
      content: '';
      position: absolute;
      width: 20px;
      height: 20px;
      border-color: var(--gold);
      border-style: solid;
    }
    .login-card::before { top: -1px; left: -1px; border-width: 1px 0 0 1px; }
    .login-card::after  { bottom: -1px; right: -1px; border-width: 0 1px 1px 0; }

    .login-logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2rem;
      font-weight: 300;
      letter-spacing: 0.15em;
      color: var(--gold-light);
      text-align: center;
      margin-bottom: 6px;
    }

    .login-subtitle {
      text-align: center;
      font-size: 0.65rem;
      letter-spacing: 0.25em;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-bottom: 40px;
    }

    .divider {
      width: 40px;
      height: 1px;
      background: var(--gold);
      margin: 0 auto 36px;
      opacity: 0.5;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .form-group input {
      width: 100%;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(201,168,76,0.15);
      color: var(--white);
      font-family: 'Tenor Sans', sans-serif;
      font-size: 0.9rem;
      padding: 13px 16px;
      outline: none;
      transition: border-color 0.3s, background 0.3s;
    }

    .form-group input:focus {
      border-color: rgba(201,168,76,0.5);
      background: rgba(201,168,76,0.04);
    }

    .form-group input::placeholder {
      color: #333;
    }

    .btn-login {
      width: 100%;
      background: transparent;
      border: 1px solid var(--gold);
      color: var(--gold);
      font-family: 'Tenor Sans', sans-serif;
      font-size: 0.7rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      padding: 15px;
      cursor: pointer;
      margin-top: 10px;
      transition: background 0.3s, color 0.3s;
      position: relative;
      overflow: hidden;
    }

    .btn-login:hover {
      background: var(--gold);
      color: var(--black);
    }

    .btn-login:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .error-msg {
      display: none;
      background: rgba(200, 50, 50, 0.1);
      border: 1px solid rgba(200, 50, 50, 0.3);
      color: #e07070;
      font-size: 0.78rem;
      padding: 10px 14px;
      margin-top: 16px;
      text-align: center;
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
    }

    .back-link {
      display: block;
      text-align: center;
      margin-top: 28px;
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-muted);
      text-decoration: none;
      transition: color 0.3s;
    }

    .back-link:hover { color: var(--gold); }
  </style>
</head>
<body>

  <div class="bg-noise"></div>
  <div class="bg-lines"></div>

  <div class="login-wrap">
    <div class="login-card">
      <div class="login-logo">Aura Noir</div>
      <div class="login-subtitle">Área Administrativa</div>
      <div class="divider"></div>

      <form id="loginForm">
        <div class="form-group">
          <label for="loginEmail">E-mail</label>
          <input type="email" id="loginEmail" required placeholder="admin@auranoir.com" autocomplete="email">
        </div>
        <div class="form-group">
          <label for="loginPassword">Senha</label>
          <input type="password" id="loginPassword" required placeholder="••••••••" autocomplete="current-password">
        </div>

        <button type="submit" class="btn-login" id="loginBtn">Entrar</button>
        <div class="error-msg" id="errorMsg">E-mail ou senha incorretos. Tente novamente.</div>
      </form>

      <a href="../index.html" class="back-link">← Voltar à Loja</a>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBke7blmmwi9jKM9_Pd050A17a-Mz_as9E",
      authDomain: "perfumaria-34f48.firebaseapp.com",
      projectId: "perfumaria-34f48",
      storageBucket: "perfumaria-34f48.firebasestorage.app",
      messagingSenderId: "633215543720",
      appId: "1:633215543720:web:90650181ecd576a64d159d"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // Se já estiver logado, redireciona direto para o admin
    onAuthStateChanged(auth, (user) => {
      if (user) window.location.href = '/pages/admin.html';
    });

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      const errorMsg = document.getElementById('errorMsg');
      const email = document.getElementById('loginEmail').value;
      const password = document.getElementById('loginPassword').value;

      btn.disabled = true;
      btn.textContent = 'Autenticando...';
      errorMsg.style.display = 'none';

      try {
        await signInWithEmailAndPassword(auth, email, password);
        window.location.href = '/pages/admin.html';
      } catch (err) {
        errorMsg.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Entrar';
      }
    });
  </script>

</body>
</html>
