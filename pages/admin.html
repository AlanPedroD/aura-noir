<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aura Noir — Painel Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Tenor+Sans&family=Cormorant+Garamond:wght@400;600&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="../assets/css/admin.css">
  <style>
    .admin-topbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 32px; height: 64px;
      background: #0d0d0d;
      border-bottom: 1px solid rgba(201,168,76,0.15);
      position: sticky; top: 0; z-index: 100;
    }
    .admin-topbar-logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.3rem; font-weight: 300;
      letter-spacing: 0.15em; color: #c9a84c;
    }
    .admin-topbar-actions { display: flex; align-items: center; gap: 12px; }
    .topbar-btn {
      display: flex; align-items: center; gap: 7px;
      padding: 8px 16px;
      font-family: 'Tenor Sans', sans-serif;
      font-size: 0.7rem; letter-spacing: 0.15em; text-transform: uppercase;
      cursor: pointer; text-decoration: none;
      transition: background 0.2s, color 0.2s, border-color 0.2s;
    }
    .topbar-btn svg { width: 14px; height: 14px; }
    .btn-back-store { background: transparent; border: 1px solid rgba(201,168,76,0.3); color: #c9a84c; }
    .btn-back-store:hover { background: rgba(201,168,76,0.08); border-color: #c9a84c; }
    .btn-logout { background: transparent; border: 1px solid rgba(180,60,60,0.35); color: #c97070; }
    .btn-logout:hover { background: rgba(180,60,60,0.1); border-color: #c97070; }
    .admin-user-info { font-size: 0.7rem; color: #555; font-family: 'Tenor Sans', sans-serif; }

    /* Destaque checkbox — estilo diferenciado */
    .destaque-group {
      border: 1px solid rgba(201,168,76,0.3);
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      background: rgba(201,168,76,0.04);
      margin-bottom: 16px;
    }
    .destaque-group input[type="checkbox"] { width: 18px; height: 18px; accent-color: #c9a84c; cursor: pointer; flex-shrink: 0; }
    .destaque-group label { cursor: pointer; margin: 0; font-size: 0.85rem; }
    .destaque-group label strong { color: #c9a84c; }
    .destaque-group label small { display: block; color: #666; font-size: 0.72rem; margin-top: 2px; }
  </style>
</head>
<body>

  <div class="admin-topbar">
    <div class="admin-topbar-logo">Aura Noir</div>
    <div class="admin-topbar-actions">
      <span class="admin-user-info" id="adminUserEmail"></span>
      <a href="../index.html" class="topbar-btn btn-back-store">
        <i data-lucide="store"></i> Voltar à Loja
      </a>
      <button class="topbar-btn btn-logout" id="logoutBtn">
        <i data-lucide="log-out"></i> Sair
      </button>
    </div>
  </div>

  <header>
    <h1>AURA NOIR — GERENCIADOR DA COLEÇÃO</h1>
  </header>

  <div class="admin-container">

    <div class="panel-box">
      <h2 id="formTitle">Adicionar Novo Perfume</h2>
      <form id="productForm">
        <input type="hidden" id="productId">

        <div class="form-group">
          <label for="prodName">Nome do Perfume *</label>
          <input type="text" id="prodName" required placeholder="Ex: Rose Éternelle">
        </div>

        <div class="form-group">
          <label for="prodSub">Subtítulo / Marca *</label>
          <input type="text" id="prodSub" required placeholder="Ex: LUMIÈRE" value="LUMIÈRE">
        </div>

        <div class="form-group">
          <label for="prodNotes">Família / Notas Olfativas</label>
          <input type="text" id="prodNotes" placeholder="Ex: Floral • Rosa Turca • Almíscar">
        </div>

        <div class="form-group">
          <label for="prodDesc">Descrição do Produto</label>
          <textarea id="prodDesc" rows="4" placeholder="Ex: Uma fragrância envolvente que desperta memórias adormecidas..."></textarea>
        </div>

        <div class="form-group">
          <label for="prodTag">Tag em Destaque (Badge)</label>
          <select id="prodTag">
            <option value="">Nenhuma</option>
            <option value="mais-vendido">Mais Vendido</option>
            <option value="novo">Novo</option>
            <option value="promocao">Promoção</option>
          </select>
        </div>

        <div class="form-group">
          <label for="prodPrice">Preço de Venda (R$) *</label>
          <input type="number" step="0.01" id="prodPrice" required placeholder="289.00">
        </div>

        <div class="checkbox-group form-group">
          <input type="checkbox" id="prodPromo">
          <label for="prodPromo">Este produto está em Promoção?</label>
        </div>

        <div class="form-group hidden" id="oldPriceWrapper">
          <label for="prodOldPrice">Preço Antigo (Aparecerá Riscado R$) *</label>
          <input type="number" step="0.01" id="prodOldPrice" placeholder="389.00">
        </div>

        <!-- CAMPO DESTAQUE -->
        <div class="destaque-group">
          <input type="checkbox" id="prodDestaque">
          <label for="prodDestaque">
            <strong>⭐ Exibir na seção "Destaques" da página inicial</strong>
            <small>Máximo de 3 produtos em destaque simultâneos.</small>
          </label>
        </div>

        <div class="form-group">
          <label for="prodImageFile">Imagem do Dispositivo *</label>
          <input type="file" id="prodImageFile" accept="image/*">
          <input type="hidden" id="prodImageUrl">
          <img id="imagePreview" class="preview-img hidden" src="">
        </div>

        <button type="submit" class="btn-save" id="saveBtn">Salvar Produto na Loja</button>
        <button type="button" class="btn-save hidden" id="cancelEditBtn" style="background:#7f8c8d;margin-top:10px;">Cancelar Edição</button>
      </form>
    </div>

    <div class="panel-box">
      <h2>Produtos Cadastrados</h2>
      <div id="adminProductsList">
        <p style="color:var(--text-muted);">Buscando banco de dados...</p>
      </div>
    </div>

  </div>

  <script type="module" src="../assets/js/admin.js" defer></script>
</body>
</html>
